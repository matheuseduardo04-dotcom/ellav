<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, follow">
  <meta name="description" content="404 - Pagina nao encontrada | ELLAV Comunicacao Visual">
  <title>404 - Pagina nao encontrada | ELLAV</title>

  <link rel="icon" href="assets/favicon.png" type="image/png">
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.png" type="image/png">

  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #061326;
      overflow: hidden;
    }

    .page-404 {
      position: relative;
      width: min(100vw, calc(100vh * 2.326923));
      aspect-ratio: 1452 / 624;
      background: #061326;
    }

    .page-404 img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .home-link {
      position: absolute;
      left: 34.3%;
      top: 79.6%;
      width: 30.4%;
      height: 9%;
      border-radius: 8px;
      color: transparent;
      text-decoration: none;
      cursor: pointer;
    }

    .home-link:focus-visible {
      outline: 3px solid rgba(255, 255, 255, 0.9);
      outline-offset: 4px;
    }

    .home-link span {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
  </style>
</head>
<body>
  <main class="page-404">
    <img src="assets/404.jpg" alt="Oops! Parece que voce se perdeu. 404 - Pagina nao encontrada.">
    <a class="home-link" href="index.html" aria-label="Voltar para a pagina inicial">
      <span>Voltar para a pagina inicial</span>
    </a>
  </main>
</body>
</html>
